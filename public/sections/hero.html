<!-- src/sections/hero.html -->
<section id="hero" class="hero relative h-screen w-full overflow-hidden">
  <!-- 3D canvas layer -->
  <div id="canvas-stage" class="absolute inset-0 z-10"></div>

  <!-- Nav -->
  <header class="absolute top-0 left-0 right-0 z-30 flex items-center justify-between px-6 md:px-12 py-8 md:py-10">
    <a href="#" class="flex items-center gap-4 group">
      <!-- Use absolute path -->
      <img src="/images/neo-logo.png" id="nav-logo" alt="Neo Creatives Logo" class="h-16 md:h-20 w-auto">
      <span class="font-display text-2xl md:text-4xl tracking-[0.02em] leading-none">
        <span class="font-light">NEO
          <span class="font-body text-base md:text-2xl font-normal text-bone/80 align-middle">
            <br class="hidden md:block" /> CREATIVES
          </span>
        </span>
      </span>
    </a>

    <!-- Menu Button -->
    <button class="menu-btn flex items-center gap-2.5 p-3 cursor-pointer" aria-label="Open menu">
      <span class="w-8 h-0.5 bg-white/80"></span>
      <span class="w-8 h-0.5 bg-white/80"></span>
      <span class="w-8 h-0.5 bg-white/80"></span>
    </button>
  </header>

  <!-- Popup Menu -->
  <div id="menuPopup" class="fixed inset-0 z-40 pointer-events-none opacity-0 transition-opacity duration-500 ease-out">
    <div class="absolute inset-0 bg-black/40"></div>
    <div
      class="absolute top-20 right-6 md:top-15 md:right-12 w-[90vw] max-w-2xl bg-white rounded-sm shadow-2xl transform scale-90 transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] pointer-events-auto">
      <button id="closeMenuBtn"
        class="absolute top-6 right-6 md:top-8 md:right-8 w-10 h-10 flex items-center justify-center group cursor-pointer">
        <svg class="w-8 h-8 text-ink group-hover:rotate-90 transition-transform duration-300" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 6L18 18M6 18L18 6" stroke-linecap="round" />
        </svg>
      </button>
      <div class="px-10 md:px-16 pt-16 pb-10">
        <nav class="space-y-6 md:space-y-8">
          <a href="#services" class="menu-link flex items-center gap-4 md:gap-6 group cursor-pointer">
            <span class="text-accent font-display text-sm md:text-base font-medium">01</span>
            <span class="h-px w-6 md:w-8 bg-accent/40"></span>
            <span
              class="font-display text-xl md:text-3xl text-ink tracking-wide group-hover:text-accent transition-colors duration-300 relative inline-block">
              SERVICES
              <span
                class="absolute left-1/2 bottom-0 w-0 h-0.5 bg-accent transition-all duration-300 group-hover:w-full group-hover:left-0"></span>
            </span>
          </a>
          <a href="#features" class="menu-link flex items-center gap-4 md:gap-6 group cursor-pointer">
            <span class="text-accent font-display text-sm md:text-base font-medium">02</span>
            <span class="h-px w-6 md:w-8 bg-accent/40"></span>
            <span
              class="font-display text-xl md:text-3xl text-ink tracking-wide group-hover:text-accent transition-colors duration-300 relative inline-block">
              FEATURES
              <span
                class="absolute left-1/2 bottom-0 w-0 h-0.5 bg-accent transition-all duration-300 group-hover:w-full group-hover:left-0"></span>
            </span>
          </a>
          <a href="#contact" class="menu-link flex items-center gap-4 md:gap-6 group cursor-pointer">
            <span class="text-accent font-display text-sm md:text-base font-medium">02</span>
            <span class="h-px w-6 md:w-8 bg-accent/40"></span>
            <span
              class="font-display text-xl md:text-3xl text-ink tracking-wide group-hover:text-accent transition-colors duration-300 relative inline-block">
              CONTACT
              <span
                class="absolute left-1/2 bottom-0 w-0 h-0.5 bg-accent transition-all duration-300 group-hover:w-full group-hover:left-0"></span>
            </span>
          </a>
        </nav>
      </div>
    </div>
  </div>

  <!-- Scroll cue -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-2 text-bone/50">
    <span class="font-body text-[10px] tracking-[0.25em] uppercase">Scroll</span>
    <span class="scroll-line"></span>
  </div>
</section>
